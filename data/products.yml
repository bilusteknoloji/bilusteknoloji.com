    - slug: kasabook
      display_order: 1
      name: KasaBook
      category: Finans Yönetimi
      model: SaaS
      tagline: Büyüyen İşletmeler için Akıllı Finans Yönetimi
      summary: |
        Gider ve gelir takibi, **yapay zeka** ile fiş ve fatura tarama, banka
        ekstreleri, K/Z raporları ve **akıllı içgörüler** — hepsi tek platformda.
      features:
        - Gider ve gelir defteri (çoklu para birimi)
        - YZ ile fiş, fatura ve belge tarama
        - Banka ekstresi içe aktarma ve otomatik sınıflandırma
        - KasaBook IQ — doğal dilde YZ asistanı
        - K/Z ve nakit akışı raporları
        - Ekip işbirliği ve çalışma alanları
      stats:
        - value: "500+"
          label: İşletme
        - value: "50K+"
          label: İşlem takibi
        - value: "12+"
          label: Para birimi
        - value: "5"
          label: Dil desteği
      tech:
        - Go
        - Next.js
        - OpenAI
        - PostgreSQL
        - Stripe
      stripe: true
      url: https://kasabook.pro
      screenshot: products/kasabook.png
