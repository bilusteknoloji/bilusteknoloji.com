    - slug: splitray
      display_order: 8
      name: Splitray
      category: Geliştirici Araçları
      model: SaaS
      tagline: Tek Webhook, Sınırsız Hedef
      summary: |
        App Store, **Stripe**, GitHub ve daha fazlasından gelen webhook'ları
        birden fazla hedefe **eş zamanlı** yönlendirin. Otomatik yeniden deneme,
        HMAC imza doğrulama ve **tam teslimat logları**.
      features:
        - Fan-out — tek webhook, sınırsız hedef
        - Exponential backoff ile otomatik yeniden deneme
        - HMAC imza doğrulama (gelen ve giden)
        - Tam teslimat logları ve durum takibi
        - Tek tıkla endpoint açma/kapama
        - 7+ webhook sağlayıcı desteği
      stats:
        - value: "7+"
          label: Sağlayıcı
        - value: "Sınırsız"
          label: Hedef
      tech:
        - Go
        - React
        - Stripe
      stripe: true
      url: https://splitray.app
      screenshot: products/splitray.png
