    - slug: talentscore
      display_order: 5
      name: Talent Score
      category: Özgeçmiş Analizi
      model: SaaS
      tagline: YZ Destekli Özgeçmiş Analizi ve ATS Skorlama Platformu
      summary: |
        **10M+** özgeçmiş üzerinde eğitilmiş YZ ile profesyonel ATS skorlama,
        yetkinlik değerlendirmesi ve **kariyer önerileri**. İş arayanlar ve
        işe alım ekipleri için.
      features:
        - Kapsamlı 0-100 ATS uyumluluk skorlama
        - Yetkinlik tespiti ve seviye belirleme
        - YZ destekli kariyer yönlendirme ve pozisyon eşleştirme
        - Toplu yükleme (10 özgeçmişe kadar)
        - PDF, DOCX ve TXT format desteği
      stats:
        - value: "10M+"
          label: Eğitim verisi
        - value: "%95"
          label: Doğruluk
        - value: "~20sn"
          label: Analiz süresi
      tech:
        - Python
        - Django
        - Go
        - Alpine.js
        - OpenAI
        - PostgreSQL
      stripe: true
      url: https://talentscore.cloud
      screenshot: products/talentscore.png
    - slug: secretdrop
      display_order: 6
      name: SecretDrop
      category: Güvenlik
      model: Açık Kaynak
      tagline: Şifreli Tek Kullanımlık Gizli Bilgi Paylaşımı
      summary: |
        API anahtarlarını, .env dosyalarını ve hassas bilgileri **güvenle** paylaşın.
        Şifreleme anahtarı sunucuya **asla ulaşmaz**. Alıcı e-posta ile doğrulanır,
        gizli bilgi okunduktan sonra **kalıcı olarak silinir**.
      features:
        - AES-256-GCM şifreleme (anahtar sunucuya ulaşmaz)
        - HKDF-SHA256 ile alıcıya bağlı çözme
        - Okunduktan sonra kalıcı silme (burn after reading)
        - OAuth ile giriş (Google, GitHub, Apple)
        - Tamamen açık kaynak (MIT lisansı)
      stats:
        - value: "AES-256"
          label: Şifreleme
        - value: "0"
          label: Veri saklama
      tech:
        - Go
        - React
        - Stripe
      stripe: true
      url: https://secretdrop.us
      screenshot: products/secretdrop.png
