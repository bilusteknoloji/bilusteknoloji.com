        GitHub, GitLab, Gitea ve Codeberg'den **gerçek zamanlı** webhook
        yakalama. Geliştirici bazında **aktivite metrikleri** ve **maliyet analizi**.
      features:
        - Gerçek zamanlı webhook yakalama
        - Geliştirici bazlı aktivite metrikleri
        - Commit başına mühendislik maliyet analizi
        - Cloud veya on-premise kurulum
